[build]
  command = "npm run build:frontend"
  publish = "dist/public"

# Environment variables for Netlify
[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Don't cache API responses
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
